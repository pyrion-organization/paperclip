services:
  paperclip:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "${PAPERCLIP_PORT:-3100}:3100"
    environment:
      HOST: "0.0.0.0"
      PAPERCLIP_HOME: "/paperclip"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_EMAIL_WORKER_ENABLED: "${PAPERCLIP_EMAIL_WORKER_ENABLED:-true}"
      PAPERCLIP_EMAIL_WORKER_IDLE_MS: "${PAPERCLIP_EMAIL_WORKER_IDLE_MS:-5000}"
      PAPERCLIP_EMAIL_WORKER_BATCH_SIZE: "${PAPERCLIP_EMAIL_WORKER_BATCH_SIZE:-10}"
      PAPERCLIP_EMAIL_WORKER_SCHEDULER_INTERVAL_MS: "${PAPERCLIP_EMAIL_WORKER_SCHEDULER_INTERVAL_MS:-10000}"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - "${PAPERCLIP_DATA_DIR:-../data/docker-paperclip}:/paperclip"
