name: Release Verification

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Commit SHA, branch, or tag to verify without publishing
        required: true
        type: string
        default: master

concurrency:
  group: release-verification-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release candidate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.source_ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Run tests
        run: pnpm test:run

      - name: Build
        run: pnpm build

      - name: Verify CLI npm bundle
        run: ./scripts/build-npm.sh --skip-checks --skip-typecheck
